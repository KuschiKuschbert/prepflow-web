name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

env:
  NODE_VERSION: '22'

# Default permissions for all jobs (principle of least privilege)
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 🔍 Quality Checks
  quality-checks:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Lint code
        run: npm run lint

      - name: 🎨 Check formatting
        run: npm run format:check

      - name: 🔍 TypeScript check
        run: npm run type-check

      - name: 📜 Audit scripts (Hygiene)
        run: npm run audit:scripts

      - name: 🔒 Security (Auditor)
        run: npm run check:security

      - name: 🧬 Health (Sentinel)
        run: npm run check:health
        continue-on-error: true

      - name: 🏛️ Architecture (Architect)
        run: npm run check:architecture
        continue-on-error: true

      - name: 📏 File size check
        run: npm run lint:filesize
        continue-on-error: true

      - name: 📄 ADR check
        run: npm run check:adr
        continue-on-error: true

      - name: 🔒 Security audit
        run: npm audit --audit-level=high

      - name: 🧪 Run tests
        run: npm run test
        continue-on-error: true

  # 🏗️ Build & Test
  build-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    needs: quality-checks
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        # actionlint: disable=expr
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run build

      - name: 📊 Build size analysis
        run: |
          echo "📊 Build size analysis:"
          du -sh .next/static/chunks/ || echo "No chunks directory found"
          find .next/static -name "*.js" -exec ls -lh {} \; | head -10 || echo "No JS files found"

      - name: 📦 Bundle budget check
        run: npm run check:bundle

  # 🧪 E2E Smoke Tests (Zero Console Errors)
  e2e-smoke:
    name: 🧪 E2E Smoke
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: 🧪 Run E2E smoke tests
        run: npm run test:smoke
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        continue-on-error: true

  # 🧪 E2E Full Crawl (main only - console error regression)
  e2e-crawl:
    name: 🧪 E2E Crawl
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: 🧪 Run E2E full crawl
        run: npm run test:crawl
        continue-on-error: true
        env:
          CI: 'true'
          AUTH0_BYPASS_DEV: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Upload crawl report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: crawl-report
          path: |
            CRAWL_REPORT.md
            CRAWL_REPORT.json
          if-no-files-found: ignore
          retention-days: 7

  # 🚀 Deploy to Vercel
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [quality-checks, build-test]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📊 Deployment Status
        if: always()
        run: |
          echo "✅ Vercel deployment is handled automatically via the GitHub integration."
          echo "🚀 PrepFlow is deploying to production via Vercel's GitHub App."
          echo "   Check https://vercel.com/derkusch-gmailcoms-projects/prepflow-web for live status."

  # 📈 Notify on Success/Failure
  notify:
    name: 📈 Notify
    runs-on: ubuntu-latest
    needs: [quality-checks, build-test, deploy]
    if: always()
    permissions:
      contents: read

    steps:
      - name: 📈 Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "🚀 PrepFlow deployed to production"
          elif [ "${{ needs.deploy.result }}" == "failure" ]; then
            echo "❌ Deployment failed!"
            echo "🔧 Check the logs for issues"
          elif [ "${{ needs.deploy.result }}" == "skipped" ] || [ -z "${{ needs.deploy.result }}" ]; then
            echo "⏳ Deployment skipped (not on main branch or deploy job not executed)"
          else
            echo "⚠️ Deployment status: ${{ needs.deploy.result }}"
          fi
