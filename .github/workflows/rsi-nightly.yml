name: RSI Nightly Improvement
# Note: Requires "Read and write permissions" and "Allow GitHub Actions to create and approve pull requests" in Repo Settings > Actions > General
on:
  schedule:
    # Run at 15:00 UTC every day (01:00 AM AEDT)
    - cron: '0 15 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rsi-cycle:
    name: Recursive Self-Improvement Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run RSI Cycle (Orchestrator)
        # using --full mode for nightly runs to include refactoring/heavy tasks if needed
        run: npm run rsi:run -- --full
        env:
          CI: true

      - name: Verify Resulting Health & Stability
        id: verify
        run: |
          set -eo pipefail
          echo "🔍 Running comprehensive health check on RSI output..."

          # 1. Check Technical Debt (DEBT.md)
          if grep -q "\[ \]" docs/DEBT.md 2>/dev/null; then
            echo "DEBT_CLEAN=false" >> $GITHUB_OUTPUT
            echo "🛑 DEBT.md still has pending tasks."
          else
            echo "DEBT_CLEAN=true" >> $GITHUB_OUTPUT
            echo "✅ DEBT.md is clean!"
          fi

          # 2. Run architecture, security, and health checks
          # continue-on-error on the step means job won't fail,
          # but set -e means CHECKS_PASSED=true is only reached if all pass
          npm run check:architecture
          npm run check:security
          npm run check:health

          # 3. Run type-check (strict stability check)
          npm run type-check

          # Only reached if all of the above succeeded
          echo "CHECKS_PASSED=true" >> $GITHUB_OUTPUT
          echo "✅ All health checks passed."
        continue-on-error: true

      - name: Check for Changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create-pr
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(rsi): automated self-improvement cycle'
          title: '🤖 RSI Daily Improvements'
          body: |
            This PR was automatically generated by the Recursive Self-Improvement (RSI) system.

            **Cycle Summary:**
            - Auto-Fixer: Ran cleanup checks and applied high-confidence fixes.
            - Self-Optimization: Tuned system parameters based on metrics.
            - Meta-Learning: Analyzed history for new insights.
            - Rule Evolution: Generated potential new rules.
            - Health Check: ${{ steps.verify.outputs.CHECKS_PASSED == 'true' && '✅ PASSED' || '❌ FAILED' }}
            - Debt Status: ${{ steps.verify.outputs.DEBT_CLEAN == 'true' && '✅ CLEAN' || '🛑 PENDING' }}

            🤖 **Auto-merge eligibility**: This PR will be auto-merged if:
            1. All CI passes AND changes are limited to safe paths.
            2. **OR** All CI passes AND `DEBT.md` is empty (Phase Complete).
          branch: rsi/nightly-improvements
          base: main
          delete-branch: true

      # Gated Auto-Merge: Only merge if changes are limited to safe paths
      # Add more paths to SAFE_PATHS as trust in RSI grows
      - name: Check if changes are safe to auto-merge
        id: safe-check
        if: steps.create-pr.outputs.pull-request-number
        run: |
          # Define safe paths that can be auto-merged without human review
          # Extend this list as you gain confidence in RSI
          SAFE_PATHS=(
            "docs/rsi/"
            "reports/"
            ".eslint"
            "rsi.eslint.config"
            # RSI infrastructure (Phase 1 complete)
            "lib/rsi/"
            "scripts/rsi/"
            # Future: add more paths here as RSI proves trustworthy
            # "lib/utils/" (for formatting-only changes)
          )

          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check if all changes are in safe paths
          SAFE_TO_MERGE="true"
          while IFS= read -r file; do
            IS_SAFE="false"
            for safe_path in "${SAFE_PATHS[@]}"; do
              if [[ "$file" == *"$safe_path"* ]]; then
                IS_SAFE="true"
                break
              fi
            done
            if [[ "$IS_SAFE" == "false" ]]; then
              echo "⚠️ Unsafe file detected: $file"
              SAFE_TO_MERGE="false"
            fi
          done <<< "$CHANGED_FILES"

          echo "safe_to_merge=$SAFE_TO_MERGE" >> $GITHUB_OUTPUT
          if [[ "$SAFE_TO_MERGE" == "true" ]]; then
            echo "✅ All changes are in safe paths - eligible for auto-merge"
          else
            echo "🛑 Some changes require human review - skipping path-based auto-merge"
          fi

      # Final decision logic
      - name: Decision Logic
        id: decision
        run: |
          CHECKS_PASSED="${{ steps.verify.outputs.CHECKS_PASSED }}"
          DEBT_CLEAN="${{ steps.verify.outputs.DEBT_CLEAN }}"
          SAFE_PATHS="${{ steps.safe-check.outputs.safe_to_merge }}"

          AUTO_MERGE="false"

          if [[ "$CHECKS_PASSED" == "true" ]]; then
             if [[ "$DEBT_CLEAN" == "true" ]]; then
                echo "🚀 Condition Met: All checks passed AND Tech Debt is clear. Auto-merging..."
                AUTO_MERGE="true"
             elif [[ "$SAFE_PATHS" == "true" ]]; then
                echo "✅ Condition Met: Changes are within safe paths. Auto-merging..."
                AUTO_MERGE="true"
             fi
          fi

          echo "eligible=$AUTO_MERGE" >> $GITHUB_OUTPUT

      - name: Enable Auto-Merge & Recursive Trigger
        if: steps.decision.outputs.eligible == 'true' && steps.create-pr.outputs.pull-request-number
        run: |
          echo "🤖 Attempting to merge PR #${{ steps.create-pr.outputs.pull-request-number }}"
          # Try auto-merge first (deferred)
          if ! gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash; then
            echo "⚠️ Auto-merge failed (possibly already clean or restricted). Attempting direct merge..."
            gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --admin
          fi

          # Recursive Trigger: If debt still exists, schedule the next batch
          if [[ "${{ steps.verify.outputs.DEBT_CLEAN }}" == "false" ]]; then
            echo "🔄 Debt still exists. Scheduling recursive follow-up run..."
            # Wait 60 seconds to allow the merge to register and avoid overlap issues
            sleep 60
            gh workflow run rsi-nightly.yml
          else
            echo "✨ All debt cleared. Nightly mission complete."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
